<h2 mat-dialog-title>{{ "confirm action" | translate }}</h2>
<mat-dialog-content>{{ data.questionKey | translate }}</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-raised-button [mat-dialog-close]="false">{{ "no" | translate }}</button>
    <button mat-raised-button [mat-dialog-close]="true" color="primary" cdkFocusInitial>{{ "yes" | translate }}</button>
</mat-dialog-actions>
